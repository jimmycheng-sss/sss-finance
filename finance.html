<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSS Finance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-md mx-auto p-4">
        <!-- Header -->
        <header class="flex justify-between items-center mb-6 pt-4">
            <h1 class="text-2xl font-bold text-gray-800">SSS 財務狀況</h1>
            <div class="bg-blue-600 text-white p-2 rounded-lg">
                <i class="fa-solid fa-bolt"></i>
            </div>
        </header>

        <!-- Summary Cards -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
                <p class="text-xs text-gray-500 uppercase font-bold">總餘額 (CAD)</p>
                <p id="total-balance" class="text-xl font-bold text-gray-900">$0.00</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
                <p class="text-xs text-gray-500 uppercase font-bold">欠 Jimmy (CAD)</p>
                <p id="jimmy-loans" class="text-xl font-bold text-red-600">$0.00</p>
            </div>
        </div>

        <!-- Transactions -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center">
                <h2 class="font-bold text-gray-800">最近交易</h2>
                <span id="update-time" class="text-[10px] text-gray-400">更新於: --</span>
            </div>
            <div id="transaction-list" class="divide-y divide-gray-50">
                <!-- Transactions will be injected here -->
                <div class="p-8 text-center text-gray-400">載入中...</div>
            </div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('accounting_data.json?t=' + Date.now());
                const data = await response.json();
                
                document.getElementById('total-balance').textContent = '$' + data.total_balance.toLocaleString();
                document.getElementById('jimmy-loans').textContent = '$' + Math.abs(data.jimmy_loans).toLocaleString();
                document.getElementById('update-time').textContent = '更新於: ' + data.last_updated;

                const list = document.getElementById('transaction-list');
                list.innerHTML = '';

                data.transactions.reverse().forEach(tx => {
                    const div = document.createElement('div');
                    div.className = 'p-4 flex justify-between items-center';
                    
                    const isPositive = tx.Amount > 0;
                    
                    div.innerHTML = `
                        <div>
                            <p class="text-sm font-semibold text-gray-800">${tx.Description}</p>
                            <p class="text-xs text-gray-400">${tx.Date} · ${tx.Category}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-bold ${isPositive ? 'text-green-600' : 'text-gray-900'}">
                                ${isPositive ? '+' : ''}${tx.Amount.toFixed(2)}
                            </p>
                        </div>
                    `;
                    list.appendChild(div);
                });
            } catch (e) {
                document.getElementById('transaction-list').innerHTML = '<div class="p-8 text-center text-red-400">載入失敗</div>';
            }
        }
        loadData();
    </script>
</body>
</html>
